version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learnlens-postgres
    environment:
      POSTGRES_USER: learnlens_user
      POSTGRES_PASSWORD: learnlens_password
      POSTGRES_DB: learnlens
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: learnlens-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
